<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>平面图形数数小游戏</title>
    <style>
        /* ===== 全部样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 32px;
            padding: 20px 20px 25px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.25);
            position: relative;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 12px;
            flex-wrap: nowrap;
        }
        .header-left {
            flex: 0 0 auto;
            min-width: 100px;
        }
        .header-left h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a2a3a;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .header-center {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            justify-content: center;
        }
        .header-center .mode-badge {
            background: #27ae60;
            color: #fff;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            white-space: nowrap;
        }
        .header-center .mode-badge.active {
            display: inline-block;
        }
        .header-center .timer-badge {
            background: #1e2f3f;
            color: #ffd966;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            display: none;
        }
        .header-center .timer-badge.active {
            display: inline-block;
        }
        .header-right {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            min-width: 100px;
        }
        .score-badge {
            background: #1e2f3f;
            color: #ffd966;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 4px 0 #0b1a26;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .score-badge span {
            color: #ffffff;
            font-weight: 300;
            margin-right: 4px;
        }
        .score-badge .score-value {
            color: #ffd966;
            font-weight: 700;
        }
        .btn-mode {
            padding: 4px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            background: #8e44ad;
            color: #fff;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
            box-shadow: 0 3px 0 #5a2d7a;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-mode:hover {
            background: #9b59b6;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #5a2d7a;
        }
        .btn-mode:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #5a2d7a;
        }
        .btn-mode.exam-active {
            background: #27ae60;
            box-shadow: 0 3px 0 #1a7a42;
        }
        .btn-mode.exam-active:hover {
            background: #2ecc71;
            box-shadow: 0 5px 0 #1a7a42;
        }
        #gameArea {
            position: relative;
            width: 100%;
            aspect-ratio: 760 / 480;
            background: #ffffff;
            border-radius: 16px;
            border: 2px solid rgba(60, 80, 100, 0.15);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            margin-bottom: 18px;
            user-select: none;
            touch-action: manipulation;
        }
        #sceneWrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 760px;
            height: 480px;
            transform-origin: top left;
            pointer-events: auto;
        }
        .shape {
            position: absolute;
            transition: transform 0.15s ease;
            will-change: transform;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .shape:hover {
            transform: scale(1.04) !important;
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.12));
        }
        .shape:active {
            transform: scale(0.96) !important;
        }
        .shape-highlight-green {
            outline: 4px solid #00cc44 !important;
            outline-offset: 3px !important;
            z-index: 20 !important;
            filter: drop-shadow(0 0 8px rgba(0, 204, 68, 0.7)) !important;
        }
        .shape-highlight-red {
            outline: 4px solid #ff0000 !important;
            outline-offset: 3px !important;
            z-index: 20 !important;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.7)) !important;
        }
        .triangle-wrapper.shape-highlight-green,
        .triangle-wrapper.shape-highlight-red {
            outline: 4px solid #00cc44 !important;
            outline-offset: 3px !important;
            z-index: 20 !important;
            filter: drop-shadow(0 0 8px rgba(0, 204, 68, 0.7)) !important;
        }
        .triangle-wrapper.shape-highlight-red {
            outline: 4px solid #ff0000 !important;
            outline-offset: 3px !important;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.7)) !important;
        }
        .rect {
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 0;
        }
        .square {
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 0;
        }
        .circle {
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .triangle {
            width: 0 !important;
            height: 0 !important;
            background: none !important;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.08));
        }
        .triangle:hover {
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.15));
        }
        .para {
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
        }
        .count-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.7), 0 0 4px rgba(0, 0, 0, 0.8), 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            line-height: 1;
            z-index: 5;
            font-family: "Segoe UI", sans-serif;
            display: none;
        }
        .triangle-wrapper .count-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.7), 0 0 4px rgba(0, 0, 0, 0.8), 0 2px 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            line-height: 1;
            z-index: 5;
            font-family: "Segoe UI", sans-serif;
            display: none;
        }
        .panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffffd6;
            backdrop-filter: blur(4px);
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.04);
        }
        .panel-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            width: 100%;
        }
        .question-box {
            flex: 1 1 200px;
            font-size: 18px;
            font-weight: 600;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .question-box .shape-label {
            display: inline-block;
            background: #eef3f9;
            padding: 2px 16px;
            border-radius: 30px;
            color: #1f3a57;
            font-weight: 700;
            font-size: 20px;
        }
        .question-box .round-hint {
            font-size: 15px;
            font-weight: 400;
            color: #5a6a7e;
            background: #eef3f9;
            padding: 2px 12px;
            border-radius: 30px;
        }
        .question-box .btn-mode {
            margin-left: 2px;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1 1 auto;
            justify-content: flex-end;
        }
        .input-group input {
            width: 90px;
            padding: 8px 12px;
            font-size: 17px;
            font-weight: 500;
            border: 2px solid #cddae9;
            border-radius: 40px;
            background: #f9fcff;
            transition: 0.2s;
            outline: none;
            text-align: center;
        }
        .input-group input:focus {
            border-color: #3b7eb0;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 126, 176, 0.15);
        }
        .input-group input::placeholder {
            font-weight: 400;
            color: #a0b4c9;
            font-size: 14px;
        }
        .btn {
            padding: 8px 20px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            background: #2c7cb0;
            color: #fff;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #1a4f72;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
        }
        .btn:hover {
            background: #3a8fc7;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #1a4f72;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a4f72;
        }
        .btn-secondary {
            background: #6c7e94;
            box-shadow: 0 4px 0 #3f4d5e;
        }
        .btn-secondary:hover {
            background: #7f92aa;
        }
        /* 弱化的“跳过”按钮 */
        .btn-next {
            background: #b0b8c5;
            box-shadow: 0 4px 0 #7a8290;
            color: #4a5568;
            font-weight: 500;
        }
        .btn-next:hover {
            background: #c5cdd9;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #7a8290;
        }
        .btn-next:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a8290;
        }
        .btn-next:disabled {
            opacity: 0.5;
            box-shadow: 0 4px 0 #7a8290 !important;
            transform: none !important;
            cursor: not-allowed;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 0 #1a4f72 !important;
        }
        .btn-secondary:disabled {
            box-shadow: 0 4px 0 #3f4d5e !important;
        }
        .num-keypad {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 6px 0 2px 0;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }
        .num-keypad .num-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: 600;
            background: #e8edf4;
            color: #1a2a3a;
            cursor: pointer;
            transition: all 0.12s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 48px;
        }
        .num-keypad .num-btn:active {
            transform: scale(0.92);
            background: #c8d4e4;
        }
        .num-keypad .num-btn.num-0 {
            flex: 0 0 48px;
        }
        .num-keypad .num-btn.backspace {
            background: #d5dce6;
            font-size: 22px;
            color: #2c3e50;
        }
        .num-keypad .num-btn.backspace:active {
            background: #bcc6d4;
        }
        .num-keypad .num-btn.num-clear {
            background: #e8b4b4;
            color: #7a2e2e;
            font-size: 16px;
            font-weight: 700;
        }
        .num-keypad .num-btn.num-clear:active {
            background: #dba0a0;
        }
        .result {
            font-size: 17px;
            font-weight: 600;
            padding: 6px 0 4px 0;
            text-align: center;
            width: 100%;
            min-height: 36px;
            line-height: 1.4;
        }
        .result.correct {
            color: #1f8b4c;
        }
        .result.wrong {
            color: #c73e3e;
        }
        .result.info {
            color: #3a6d8c;
        }
        .result.finished {
            color: #2c3e50;
            font-size: 20px;
            font-weight: 700;
        }
        .result.try-again {
            color: #e67e22;
            font-weight: 700;
        }
        .result.score-info {
            color: #2980b9;
            font-weight: 700;
        }
        .result.hint {
            color: #8e44ad;
            font-weight: 600;
            font-size: 15px;
        }
        .result.skipped {
            color: #e67e22;
            font-weight: 600;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.open {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-box {
            background: #ffffff;
            border-radius: 28px;
            padding: 36px 40px 32px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .modal-box h2 {
            font-size: 24px;
            color: #1a2a3a;
            margin-bottom: 8px;
        }
        .modal-box .sub {
            color: #6c7e94;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .modal-box .field {
            text-align: left;
            margin-bottom: 18px;
        }
        .modal-box .field label {
            display: block;
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 4px;
            font-size: 15px;
        }
        .modal-box .field select,
        .modal-box .field input {
            width: 100%;
            padding: 10px 14px;
            font-size: 16px;
            border: 2px solid #cddae9;
            border-radius: 12px;
            background: #f9fcff;
            outline: none;
            transition: 0.2s;
        }
        .modal-box .field select:focus,
        .modal-box .field input:focus {
            border-color: #3b7eb0;
            box-shadow: 0 0 0 4px rgba(59, 126, 176, 0.12);
        }
        .modal-box .btn-start {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            background: #27ae60;
            color: #fff;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #1a7a42;
        }
        .modal-box .btn-start:hover {
            background: #2ecc71;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #1a7a42;
        }
        .modal-box .btn-start:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a7a42;
        }
        .modal-box .btn-start:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .modal-box .btn-cancel {
            margin-top: 12px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            background: #e8edf4;
            color: #4a5a6e;
            cursor: pointer;
            transition: 0.15s;
        }
        .modal-box .btn-cancel:hover {
            background: #d5dce6;
        }
        /* 白名单反馈样式 */
        .whitelist-feedback {
            margin: 8px 0 12px 0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        .whitelist-feedback.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .whitelist-feedback.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .whitelist-feedback.loading {
            display: block;
            background: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }
        .score-modal .modal-box {
            max-width: 480px;
        }
        .score-modal .score-detail {
            text-align: left;
            background: #f0f4fa;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 12px 0 20px;
        }
        .score-modal .score-detail .item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .score-modal .score-detail .item:last-child {
            border-bottom: none;
        }
        .score-modal .total-score {
            font-size: 36px;
            font-weight: 800;
            color: #1a2a3a;
            margin: 8px 0;
        }
        .score-modal .total-score span {
            color: #27ae60;
        }

        /* ===== 排行榜样式 ===== */
        .leaderboard {
            margin-top: 18px;
            background: #ffffffd6;
            backdrop-filter: blur(4px);
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.04);
        }
        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .leaderboard-header h3 {
            font-size: 18px;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .leaderboard-header .refresh-btn {
            background: none;
            border: none;
            color: #3a6d8c;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #eef3f9;
            transition: 0.15s;
        }
        .leaderboard-header .refresh-btn:hover {
            background: #d5dce6;
        }
        .leaderboard-table-wrap {
            max-height: 260px;
            overflow-y: auto;
            border-radius: 12px;
        }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .leaderboard-table th {
            background: #1e2f3f;
            color: #ffd966;
            padding: 8px 12px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .leaderboard-table td {
            padding: 7px 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            color: #1a2a3a;
        }
        .leaderboard-table tr:nth-child(even) td {
            background: #f8faff;
        }
        .leaderboard-table .rank-1 td:first-child {
            color: #ffd700;
            font-weight: 700;
        }
        .leaderboard-table .rank-2 td:first-child {
            color: #c0c0c0;
            font-weight: 700;
        }
        .leaderboard-table .rank-3 td:first-child {
            color: #cd7f32;
            font-weight: 700;
        }
        .leaderboard-empty {
            text-align: center;
            color: #6c7e94;
            padding: 20px 0;
            font-size: 14px;
        }
        .leaderboard-loading {
            text-align: center;
            color: #6c7e94;
            padding: 12px 0;
            font-size: 14px;
        }

        /* ===== 响应式设计 ===== */
        @media (max-width: 700px) {
            .container { padding: 12px 12px 18px; }
            .header { flex-wrap: nowrap; gap: 6px; }
            .header-left { flex: 0 0 auto; min-width: auto; }
            .header-left h1 { font-size: 18px; white-space: nowrap; }
            .header-center { flex: 1 1 auto; gap: 4px; }
            .header-center .mode-badge { font-size: 11px; padding: 2px 10px; }
            .header-center .timer-badge { font-size: 11px; padding: 2px 10px; }
            .header-right { flex: 0 0 auto; min-width: auto; }
            .score-badge { font-size: 14px; padding: 4px 12px; }
            .panel { padding: 12px 14px; gap: 10px; }
            .panel-row { gap: 8px 10px; }
            .question-box { font-size: 16px; flex: 1 1 100%; justify-content: center; }
            .question-box .shape-label { font-size: 18px; }
            .question-box .btn-mode { font-size: 12px; padding: 3px 12px; }
            .input-group { justify-content: center; flex: 1 1 100%; }
            .input-group input { width: 76px; font-size: 16px; padding: 6px 10px; }
            .btn { padding: 6px 16px; font-size: 15px; }
            .num-keypad { gap: 6px; max-width: 360px; }
            .num-keypad .num-btn { width: 42px; height: 42px; font-size: 18px; flex: 0 0 42px; }
            .num-keypad .num-btn.num-0 { flex: 0 0 42px; }
            .result { font-size: 15px; min-height: 30px; padding: 4px 0 2px 0; }
            .count-label, .triangle-wrapper .count-label { font-size: 22px; }
            .modal-box { padding: 28px 24px; }
            .modal-box h2 { font-size: 20px; }
            .question-box .round-hint { font-size: 13px; }
            .leaderboard-table { font-size: 12px; }
            .leaderboard-table th, .leaderboard-table td { padding: 5px 8px; }
        }

                    <button class="btn btn-next" id="nextBtn">⏭ 跳过</button>
                    <button class="btn btn-secondary" id="resetBtn">⟳ 重玩</button>

            <div class="result" id="resultMessage">🎯 点击图形编号（再次点击取消），数一数</div>

        <div class="leaderboard" id="leaderboard">

                    e.stopPropagation();
                    const idx = shapeItems.findIndex(item => item.element === shapeEl);
                    if (idx !== -1) {
                        const item = shapeItems[idx];
                        if (item.label) item.label.style.display = 'none';
                        shapeItems.splice(idx, 1);
                        renumberAll();
                    } else {
                        if (!label) {
                            label = document.createElement('span');
                            label.className = 'count-label';
                            shapeEl.appendChild(label);
                        }
                        shapeItems.push({ element: shapeEl, label: label });
                        renumberAll();
                        label.style.transform = 'translate(-50%, -50%) scale(1.3)';
                        setTimeout(() => { label.style.transform = 'translate(-50%, -50%) scale(1)'; }, 150);
                    }
                });

                    }
                    let actualW, actualH;
                    if (type === '圆形') { actualW = w;
                        actualH = h; } else {
                        const bb = getRotatedBoundingBox(w, h, angle);
                        actualW = bb.bw;
                        actualH = bb.bh;
                    }
                    const offsetX = (actualW - w) / 2;
                    const offsetY = (actualH - h) / 2;
                    const minX = MARGIN - offsetX;
                    const maxX = CANVAS_W - MARGIN - actualW - offsetX;
                    const minY = MARGIN - offsetY;
                    const maxY = CANVAS_H - MARGIN - actualH - offsetY;
                    if (maxX < minX || maxY < minY) return null;
                    const color = randomColor();
                    for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
                        const newX = randFloat(minX, maxX);
                        const newY = randFloat(minY, maxY);
                        const cx = newX + w / 2;
                        const cy = newY + h / 2;
                        const radius = Math.sqrt(actualW * actualW + actualH * actualH) / 2 * 1.2;
                        let overlap = false;
                        for (let p of placedShapes) {
                            const dx = cx - p.cx;
                            const dy = cy - p.cy;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < radius + p.radius) { overlap = true; break; }
                        }
                        if (!overlap) {
                            placedShapes.push({ type, x: newX, y: newY, w, h, angle, cx, cy, radius, scale: (type ===
                                    '三角形') ? scaleVal : undefined, color, skew: (type === '平行四边形') ? skew :
                                undefined });
                            return { x: newX, y: newY, w, h, angle, scale: (type === '三角形') ? scaleVal : undefined,
                                color, skew: (type === '平行四边形') ? skew : undefined };
                        }
                    }
                    return null;
                }

                function ensurePlace(type, wRange, hRange, angleRange, scaleRange) {
                    let wMin = wRange[0],
                        wMax = wRange[1],
                        hMin = hRange[0],
                        hMax = hRange[1];
                    let sMin = scaleRange ? scaleRange[0] : 0.8,
                        sMax = scaleRange ? scaleRange[1] : 1.5;
                    let factor = 1.0;
                    let result = null;
                    while (factor >= 0.6) {
                        const curWMin = wMin * factor,
                            curWMax = wMax * factor;
                        const curHMin = hMin * factor,
                            curHMax = hMax * factor;
                        let curScaleRange = scaleRange ? [sMin * factor, sMax * factor] : null;
                        result = tryPlace(type, [curWMin, curWMax], [curHMin, curHMax], angleRange, curScaleRange);
                        if (result) return result;
                        factor -= 0.05;
                    }
                    const finalFactor = 0.6;
                    const curWMin = wMin * finalFactor,
                        curWMax = wMax * finalFactor;
                    const curHMin = hMin * finalFactor,
                        curHMax = hMax * finalFactor;
                    let curScaleRange = scaleRange ? [sMin * finalFactor, sMax * finalFactor] : null;
                    return tryPlace(type, [curWMin, curWMax], [curHMin, curHMax], angleRange, curScaleRange);
                }

                const adjustedConfigs = {};
                for (let type in configs) {
                    const cfg = configs[type];
                    adjustedConfigs[type] = {
                        wRange: [cfg.wRange[0] * 0.85, cfg.wRange[1] * 0.85],
                        hRange: [cfg.hRange[0] * 0.85, cfg.hRange[1] * 0.85],
                        angleRange: cfg.angleRange,
                        scaleRange: cfg.scaleRange ? [cfg.scaleRange[0] * 0.85, cfg.scaleRange[1] * 0.85] : undefined
                    };
                }

                const priorityTypes = ['平行四边形', '长方形', '正方形', '圆形', '三角形'];
                for (let type of priorityTypes) {
                    const count = counts[type] || 0;
                    if (count === 0) continue;
                    const cfg = adjustedConfigs[type];
                    for (let i = 0; i < count; i++) {
                        let result = null;
                        if (type === '三角形') {
                            result = ensurePlace(type, cfg.wRange, cfg.hRange, cfg.angleRange, cfg.scaleRange);
                        } else {
                            result = ensurePlace(type, cfg.wRange, cfg.hRange, cfg.angleRange, null);
                        }
                        if (result) {
                            const { x, y, w, h, angle, scale, color, skew } = result;
                            switch (type) {
                                case '长方形':
                                    addRect(x, y, w, h, angle, color);
                                    break;
                                case '正方形':
                                    addSquare(x, y, w, angle, color);
                                    break;
                                case '圆形':
                                    addCircle(x, y, w / 2, angle, color);
                                    break;
                                case '三角形':
                                    addTriangle(x, y, scale, angle, color);
                                    break;
                                case '平行四边形':
                                    addPara(x, y, w, h, angle, color, skew);
                                    break;
                            }
                            actualCounts[type] += 1;
                        }
                    }
                }
                return actualCounts;
            }

            // ============================================================
            //  分散图形（第1、2轮）
            // ============================================================
            function generateScattered() {
                let attempts = 0;
                let actualCounts = null;
                const configs = {
                    '长方形': { wRange: [70, 100], hRange: [40, 60], angleRange: [-35, 35] },
                    '正方形': { wRange: [45, 60], hRange: [45, 60], angleRange: [-75, 75] },
                    '圆形': { wRange: [50, 70], hRange: [50, 70], angleRange: [0, 360] },
                    '三角形': { wRange: [40, 55], hRange: [35, 50], angleRange: [-85, 85], scaleRange: [0.8, 1.2] },
                    '平行四边形': { wRange: [65, 85], hRange: [40, 55], angleRange: [-45, 45] },
                };

                while (attempts < 40) {
                    clearCanvas();
                    const counts = {};
                    SHAPE_TYPES.forEach(t => { counts[t] = randInt(2, 4); });
                    const extra = randInt(3, 6);
                    for (let i = 0; i < extra; i++) {
                        const type = SHAPE_TYPES[randInt(0, SHAPE_TYPES.length - 1)];
                        counts[type] += 1;
                    }
                    SHAPE_TYPES.forEach(t => {
                        if (counts[t] > 8) counts[t] = 8;
                    });

                    actualCounts = drawShapes(counts, configs);

                    const allExist = SHAPE_TYPES.every(t => actualCounts[t] > 0);
                    if (!allExist) { attempts++; continue; }

                    const candidates = Object.keys(actualCounts).filter(k => actualCounts[k] >= 3 && actualCounts[k] <=
                    9);
                    let valid = false;
                    if (round === 1) {
                        if (candidates.includes('平行四边形')) valid = true;
                    } else if (round === 2) {
                        if (candidates.some(k => k !== '平行四边形')) valid = true;
                    } else {
                        if (candidates.length > 0) valid = true;
                    }
                    if (valid) break;
                    attempts++;
                }

                if (!actualCounts || SHAPE_TYPES.some(t => actualCounts[t] === 0)) {
                    clearCanvas();
                    const counts = { '长方形': 3, '正方形': 3, '圆形': 3, '三角形': 3, '平行四边形': 3 };
                    actualCounts = drawShapes(counts, configs);
                }

                currentCounts = actualCounts;

                let candidates = Object.keys(actualCounts).filter(k => actualCounts[k] >= 3 && actualCounts[k] <= 9);

                if (round === 1) {
                    if (candidates.includes('平行四边形')) {
                        currentShape = '平行四边形';
                    } else {
                        if (actualCounts['平行四边形'] > 0) {
                            currentShape = '平行四边形';
                        } else {
                            currentShape = candidates[0] || '正方形';
                        }
                    }
                } else if (round === 2) {
                    const nonPara = candidates.filter(k => k !== '平行四边形');
                    if (nonPara.length > 0) {
                        currentShape = nonPara[Math.floor(Math.random() * nonPara.length)];
                    } else {
                        const allNonPara = SHAPE_TYPES.filter(k => k !== '平行四边形');
                        currentShape = allNonPara[Math.floor(Math.random() * allNonPara.length)];
                    }
                } else {
                    if (round <= 4) {
                        const unasked = candidates.filter(k => !askedShapes.includes(k));
                        if (unasked.length > 0) candidates = unasked;
                    }
                    if (candidates.length === 0) {
                        let maxCount = 0,
                            maxKey = '正方形';
                        for (let k in actualCounts) {
                            if (actualCounts[k] > maxCount) {
                                maxCount = actualCounts[k];
                                maxKey = k;
                            }
                        }
                        candidates = [maxKey];
                    }
                    currentShape = candidates[Math.floor(Math.random() * candidates.length)];
                }

                if (round <= 4) askedShapes.push(currentShape);
            }

            // ============================================================
            //  图案组合（第3、4轮）- 自动缩放以适应画布，整体放大
            // ============================================================
            function generatePattern() {
                clearCanvas();

                if (!patternData || patternData.length === 0) {
                    patternData = BUILTIN_PATTERNS.slice();
                }

                let available = [];
                // 如果是第4轮，过滤掉包含三角形的模板
                const isRound4 = (round === 4);
                for (let i = 0; i < patternData.length; i++) {
                    if (usedPatternIndices.includes(i)) continue;
                    const template = patternData[i];
                    if (isRound4) {
                        // 检查是否包含三角形
                        const hasTriangle = template.shapes.some(s => s.type === '三角形');
                        if (hasTriangle) continue; // 跳过包含三角形的模板
                    }
                    available.push(i);
                }

                if (available.length === 0) {
                    usedPatternIndices = [];
                    // 重新构建可用列表，同样应用过滤
                    available = [];
                    for (let i = 0; i < patternData.length; i++) {
                        const template = patternData[i];
                        if (isRound4) {
                            const hasTriangle = template.shapes.some(s => s.type === '三角形');
                            if (hasTriangle) continue;
                        }
                        available.push(i);
                    }
                    // 如果还没有，就全部包括（但这种情况很少）
                    if (available.length === 0) {
                        available = patternData.map((_, i) => i);
                    }
                }

                const idx = available[Math.floor(Math.random() * available.length)];
                usedPatternIndices.push(idx);

                const template = patternData[idx];

                // ---- 自动缩放和平移 ----
                let minX = Infinity,
                    maxX = -Infinity,
                    minY = Infinity,
                    maxY = -Infinity;
                for (let s of template.shapes) {
                    let x = s.x,
                        y = s.y,
                        w = s.w || s.size || (s.r ? s.r * 2 : 0),
                        h = s.h || s.size || (s.r ? s.r * 2 : 0);
                    if (s.type === '三角形') {
                        const base = 50 * s.scale;
                        const height = 45 * s.scale;
                        w = base;
                        h = height;
                    }
                    if (x < minX) minX = x;
                    if (x + w > maxX) maxX = x + w;
                    if (y < minY) minY = y;
                    if (y + h > maxY) maxY = y + h;
                }
                const patternW = maxX - minX;
                const patternH = maxY - minY;
                // 目标区域：画布中央，占85%
                const targetW = 760 * 0.85;
                const targetH = 480 * 0.85;
                const scale = Math.min(targetW / patternW, targetH / patternH);
                const offsetX = (760 - patternW * scale) / 2 - minX * scale;
                const offsetY = (480 - patternH * scale) / 2 - minY * scale;

                const actualCounts = { '长方形': 0, '正方形': 0, '圆形': 0, '三角形': 0, '平行四边形': 0 };
                for (let s of template.shapes) {
                    const angle = s.angle || 0;
                    let x = s.x * scale + offsetX;
                    let y = s.y * scale + offsetY;
                    let color = randomColor();
                    switch (s.type) {
                        case '长方形':
                            let w = s.w * scale;
                            let h = s.h * scale;
                            addRect(x, y, w, h, angle, color);
                            actualCounts['长方形']++;
                            break;
                        case '正方形':
                            let size = s.size * scale;
                            addSquare(x, y, size, angle, color);
                            actualCounts['正方形']++;
                            break;
                        case '圆形':
                            let r = s.r * scale;
                            addCircle(x, y, r, angle, color);
                            actualCounts['圆形']++;
                            break;
                        case '三角形':
                            let scaleTri = s.scale * scale;
                            addTriangle(x, y, scaleTri, angle, color);
                            actualCounts['三角形']++;
                            break;
                        case '平行四边形':
                            let wPara = s.w * scale;
                            let hPara = s.h * scale;
                            addPara(x, y, wPara, hPara, angle, color, s.skew || 0.25);
                            actualCounts['平行四边形']++;
                            break;
                    }
                }
                currentCounts = actualCounts;
                let candidates = Object.keys(actualCounts).filter(k => actualCounts[k] >= 3 && actualCounts[k] <= 9);
                if (round <= 4) {
                    const unasked = candidates.filter(k => !askedShapes.includes(k));
                    if (unasked.length > 0) candidates = unasked;
                }
                if (candidates.length === 0) {
                    let maxCount = 0,
                        maxKey = '正方形';
                    for (let k in actualCounts) {
                        if (actualCounts[k] > maxCount) {
                            maxCount = actualCounts[k];
                            maxKey = k;
                        }
                    }
                    candidates = [maxKey];
                }
                currentShape = candidates[Math.floor(Math.random() * candidates.length)];
                if (round <= 4) askedShapes.push(currentShape);
                resultMsg.textContent = `${template.name}，数一数图中的图形吧！`;
                resultMsg.className = 'result hint';
            }

            // ============================================================
            //  组合图形计数（第5轮）- 黑色轮廓，无间隙，放大，居中，无三角形
            // ============================================================
            const COMPOSITE_TEMPLATES = [{
                name: '2x2正方形组合',
                shapeType: '正方形',
                total: 5,
                draw: function() {
                    const size = 80,
                        gap = 0;
                    // 居中计算：2x2 总宽160，总高160
                    const startX = (760 - 160) / 2;
                    const startY = (480 - 160) / 2;
                    for (let i = 0; i < 2; i++) {
                        for (let j = 0; j < 2; j++) {
                            addSquareOutline(startX + i * (size + gap), startY + j * (size + gap), size, 0);
                        }
                    }
                    addHint('图中最多有几个正方形？（包括组合）');
                }
            }, {
                name: '2x3正方形组合',
                shapeType: '正方形',
                total: 8,
                draw: function() {
                    const size = 60,
                        gap = 0;
                    // 2行3列：总宽180，总高120
                    const startX = (760 - 180) / 2;
                    const startY = (480 - 120) / 2;
                    for (let i = 0; i < 2; i++) {
                        for (let j = 0; j < 3; j++) {
                            addSquareOutline(startX + i * (size + gap), startY + j * (size + gap), size, 0);
                        }
                    }
                    addHint('图中最多有几个正方形？（包括组合）');
                }
            }, {
                name: '长方形组合',
                shapeType: '长方形',
                total: 6,
                draw: function() {
                    const w = 100,
                        h = 50,
                        gap = 0;
                    // 3个长方形：总宽300，总高50
                    const startX = (760 - 300) / 2;
                    const startY = (480 - 50) / 2;
                    for (let i = 0; i < 3; i++) {
                        addRectOutline(startX + i * (w + gap), startY, w, h, 0);
                    }
                    addHint('图中最多有几个长方形？（包括组合）');
                }
            }, ];

            function addHint(text) {
                const hint = document.createElement('div');
                hint.style.position = 'absolute';
                hint.style.left = '50%';
                hint.style.top = '10px';
                hint.style.transform = 'translateX(-50%)';
                hint.style.fontSize = '18px';
                hint.style.fontWeight = '700';
                hint.style.color = '#2c3e50';
                hint.style.background = 'rgba(255,255,255,0.85)';
                hint.style.padding = '4px 16px';
                hint.style.borderRadius = '20px';
                hint.style.pointerEvents = 'none';
                hint.textContent = text;
                sceneWrapper.appendChild(hint);
            }

            function generateComposite() {
                clearCanvas();
                const template = COMPOSITE_TEMPLATES[randInt(0, COMPOSITE_TEMPLATES.length - 1)];
                template.draw();
                currentShape = template.shapeType;
                currentTotal = template.total;
                currentCounts = {};
                resultMsg.textContent = `🔍 第 5/5 轮：数出图中所有 ${SHAPE_LABELS[currentShape]} 的个数（包括组合）！`;
                resultMsg.className = 'result hint';
            }

            // ============================================================
            //  高亮图形轮廓
            // ============================================================
            function clearHighlights() {
                document.querySelectorAll('.shape-highlight-green, .shape-highlight-red').forEach(el => {
                    el.classList.remove('shape-highlight-green', 'shape-highlight-red');
                });
                document.querySelectorAll('.shape-outline').forEach(el => {
                    el.style.outline = 'none';
                });
            }

            function highlightShapes(type, color) {
                clearHighlights();
                const selector = `[data-type="${type}"]`;
                const elements = sceneWrapper.querySelectorAll(selector);
                const cls = color === 'green' ? 'shape-highlight-green' : 'shape-highlight-red';
                elements.forEach(el => {
                    el.classList.add(cls);
                });
            }

            // ============================================================
            //  场景自适应缩放
            // ============================================================
            function resizeScene() {
                if (!gameArea || !sceneWrapper) return;
                const cw = gameArea.clientWidth;
                const ch = gameArea.clientHeight;
                const sw = CANVAS_W;
                const sh = CANVAS_H;
                const scaleX = cw / sw;
                const scaleY = ch / sh;
                const scale = Math.min(scaleX, scaleY);
                sceneWrapper.style.transform = `scale(${scale})`;
                sceneWrapper.style.left = (cw - sw * scale) / 2 + 'px';
                sceneWrapper.style.top = (ch - sh * scale) / 2 + 'px';
            }

            // ============================================================
            //  数字键盘逻辑
            // ============================================================
            function initNumKeypad() {
                numKeypad.querySelectorAll('.num-btn[data-value]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        if (isGameFinished) return;
                        if (isWaiting) return;
                        e.stopPropagation();
                        const val = this.dataset.value;
                        const current = answerInput.value;
                        if (current === '0' || current === '') {
                            answerInput.value = val;
                        } else {
                            answerInput.value = current + val;
                        }
                        answerInput.dispatchEvent(new Event('input', { bubbles: true }));
                    });
                });
                backspaceBtn.addEventListener('click', function(e) {
                    if (isGameFinished) return;
                    if (isWaiting) return;
                    e.stopPropagation();
                    const current = answerInput.value;
                    if (current.length > 0) {
                        answerInput.value = current.slice(0, -1);
                        answerInput.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                });
                answerInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        checkAnswer();
                    }
                });
            }

            // ============================================================
            //  计时器
            // ============================================================
            function startTimer() {
                if (isTimerRunning) return;
                timerSeconds = 0;
                updateTimerDisplay();
                isTimerRunning = true;
                timerBadge.classList.add('active');
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(function() {
                    timerSeconds++;
                    updateTimerDisplay();
                }, 1000);
            }

            function stopTimer() {
                isTimerRunning = false;
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                timerBadge.classList.remove('active');
            }

            function resetTimer() {
                stopTimer();
                timerSeconds = 0;
                updateTimerDisplay();
            }

            function updateTimerDisplay() {
                const mins = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                const secs = String(timerSeconds % 60).padStart(2, '0');
                timerBadge.textContent = `⏱️ ${mins}:${secs}`;
            }

            function getTimerString() {
                const mins = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                const secs = String(timerSeconds % 60).padStart(2, '0');
                return `${mins}:${secs}`;
            }

            // ============================================================
            //  API 提交与排行榜（仅显示当天）
            // ============================================================
            async function submitScore(name, cls, score, correctCount, timeStr) {
                try {
                    const payload = {
                        name: name,
                        class: cls,
                        score: score,
                        correct: correctCount,
                        time: timeStr,
                        submitted_at: new Date().toISOString()
                    };
                    const response = await fetch(API_SUBMIT_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload),
                    });
                    if (!response.ok) {
                        console.warn('提交成绩失败:', response.status);
                    } else {
                        console.log('成绩提交成功');
                    }
                } catch (err) {
                    console.warn('提交成绩出错:', err);
                }
            }

            async function fetchLeaderboard() {
                try {
                    const response = await fetch(API_ALL_URL);
                    if (!response.ok) {
                        throw new Error('网络请求失败');
                    }
                    const data = await response.json();
                    // 兼容不同返回格式
                    let submissions = data.submissions || data.data || [];
                    if (!Array.isArray(submissions)) {
                        submissions = [];
                    }
                    return submissions;
                } catch (err) {
                    console.warn('获取排行榜失败:', err);
                    return [];
                }
            }

            function renderLeaderboard(submissions) {
                const today = getTodayStr();

                // 1. 过滤出今天的记录
                const todaySubmissions = submissions.filter(item => {
                    const submittedAt = item.submitted_at || item.提交时间 || '';
                    // 尝试从字符串中提取日期部分 (YYYY-MM-DD)
                    const dateMatch = submittedAt.match(/^\d{4}-\d{2}-\d{2}/);
                    if (dateMatch) {
                        return dateMatch[0] === today;
                    }
                    // 如果没有日期字段，则默认不过滤（但我们的提交都包含 submitted_at）
                    return false;
                });

                // 2. 按用户分组，取最佳成绩（最高分，分数相同则取用时最短）
                const userBest = {};
                for (let item of todaySubmissions) {
                    const name = item.name || item.姓名 || '未知';
                    const cls = item.class || item.班级 || '';
                    const score = parseInt(item.score || item.分数 || 0, 10);
                    const time = item.time || item.用时 || '99:99';
                    const correct = parseInt(item.correct || item.正确数 || 0, 10);
                    const key = name + '|' + cls;
                    if (!userBest[key] || score > userBest[key].score || (score === userBest[key].score && time < userBest[
                            key].time)) {
                        userBest[key] = { name, cls, score, time, correct };
                    }
                }

                const list = Object.values(userBest);
                // 按分数降序，分数相同按用时升序
                list.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.time.localeCompare(b.time);
                });

                // 渲染表格
                const tbody = leaderboardBody;
                tbody.innerHTML = '';
                if (list.length === 0) {
                    leaderboardTable.style.display = 'none';
                    leaderboardEmpty.style.display = 'block';
                    leaderboardLoading.style.display = 'none';
                    return;
                }
                leaderboardTable.style.display = 'table';
                leaderboardEmpty.style.display = 'none';
                leaderboardLoading.style.display = 'none';

                list.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    if (index === 0) tr.className = 'rank-1';
                    else if (index === 1) tr.className = 'rank-2';
                    else if (index === 2) tr.className = 'rank-3';
                    const rankTd = document.createElement('td');
                    rankTd.textContent = index + 1;
                    const nameTd = document.createElement('td');
                    nameTd.textContent = item.name;
                    const classTd = document.createElement('td');
                    classTd.textContent = item.cls;
                    const scoreTd = document.createElement('td');
                    scoreTd.textContent = item.score;
                    const timeTd = document.createElement('td');
                    timeTd.textContent = item.time;
                    tr.appendChild(rankTd);
                    tr.appendChild(nameTd);
                    tr.appendChild(classTd);
                    tr.appendChild(scoreTd);
                    tr.appendChild(timeTd);
                    tbody.appendChild(tr);
                });
            }

            async function refreshLeaderboard() {
                leaderboardLoading.style.display = 'block';
                leaderboardTable.style.display = 'none';
                leaderboardEmpty.style.display = 'none';
                const data = await fetchLeaderboard();
                renderLeaderboard(data);
            }

            // ============================================================
            //  白名单校验
            // ============================================================
            async function checkWhitelist(name, cls) {
                try {
                    const response = await fetch(API_WHITELIST_URL);
                    if (!response.ok) {
                        console.warn('白名单接口请求失败:', response.status);
                        return false;
                    }
                    const data = await response.json();
                    const submissions = data.submissions || [];
                    if (!Array.isArray(submissions)) {
                        return false;
                    }
                    // 检查是否存在匹配的记录（姓名和班级均匹配）
                    return submissions.some(item => {
                        const itemName = item.name || '';
                        const itemClass = item.class || '';
                        return itemName.trim() === name.trim() && itemClass.trim() === cls.trim();
                    });
                } catch (err) {
                    console.warn('白名单校验出错:', err);
                    return false;
                }
            }

            // ============================================================
            //  游戏逻辑
            // ============================================================
            function updateScoreUI() {
                scoreDisplay.textContent = `${score} / ${MAX_SCORE}`;
            }

            function nextQuestion() {
                if (isGameFinished) return;
                if (isWaiting) return;
                clearHighlights();
                roundScored = false;

                if (round >= TOTAL_ROUNDS) {
                    isGameFinished = true;
                    submitBtn.disabled = true;
                    answerInput.disabled = true;
                    nextBtn.disabled = true;
                    numKeypad.querySelectorAll('.num-btn').forEach(b => b.disabled = true);

                    // 停止计时
                    stopTimer();

                    if (isExamMode) {
                        // 提交成绩
                        const timeStr = getTimerString();
                        submitScore(examName, examClass, score, examCorrectCount, timeStr);

                        showScoreModal(timeStr);
                        resultMsg.textContent = `📝 答题完成！得分：${score} / ${MAX_SCORE}，用时 ${timeStr}`;
                        resultMsg.className = 'result finished';
                        modeBtn.textContent = '📊 查看成绩';
                        modeBtn.classList.add('exam-active');
                    } else {
                        resultMsg.textContent = `🎉 游戏结束！您的总得分：${score} / ${MAX_SCORE}`;
                        resultMsg.className = 'result finished';
                    }
                    shapeNameLabel.textContent = '---';
                    roundHint.textContent = '已完成';
                    // 刷新排行榜
                    refreshLeaderboard();
                    return;
                }

                round++;
                if (round <= 2) {
                    generateScattered();
                    roundHint.textContent = `第 ${round}/${TOTAL_ROUNDS} 轮 · 分散图形`;
                } else if (round <= 4) {
                    generatePattern();
                    roundHint.textContent = `第 ${round}/${TOTAL_ROUNDS} 轮 · 图案组合`;
                } else {
                    generateComposite();
                    roundHint.textContent = `第 ${round}/${TOTAL_ROUNDS} 轮 · 组合计数`;
                }

                if (round === 5) {
                    shapeNameLabel.textContent = SHAPE_LABELS[currentShape] + '（含组合）';
                } else {
                    shapeNameLabel.textContent = SHAPE_LABELS[currentShape];
                }
                answerInput.value = '';
                if (!resultMsg.textContent.includes('图案') && !resultMsg.textContent.includes('组合')) {
                    resultMsg.textContent = `🔍 第 ${round}/${TOTAL_ROUNDS} 轮，数一数吧！`;
                    resultMsg.className = 'result info';
                }
                wrongCount = 0;
                updateScoreUI();
                isWaiting = false;
                submitBtn.disabled = false;
                answerInput.disabled = false;
                nextBtn.disabled = false;
                resizeScene();
            }

            function checkAnswer() {
                if (isGameFinished) {
                    resultMsg.textContent = '游戏已结束，点击“重玩”重新开始。';
                    resultMsg.className = 'result info';
                    return;
                }
                if (isWaiting) {
                    resultMsg.textContent = '⏳ 请稍候，正在进入下一题…';
                    resultMsg.className = 'result info';
                    return;
                }
                if (roundScored) {
                    resultMsg.textContent = '⏳ 本轮已得分，点击“跳过”继续';
                    resultMsg.className = 'result info';
                    return;
                }

                const raw = answerInput.value.trim();
                const ans = parseInt(raw, 10);
                if (isNaN(ans) || raw === '') {
                    resultMsg.textContent = '⚠️ 请输入一个有效的数字！';
                    resultMsg.className = 'result wrong';
                    return;
                }

                let correct;
                if (round === 5) {
                    correct = currentTotal;
                } else {
                    correct = currentCounts[currentShape] || 0;
                }

                const isCorrect = (ans === correct);
                if (isCorrect) {
                    highlightShapes(currentShape, 'green');
                } else {
                    highlightShapes(currentShape, 'red');
                }

                if (isCorrect) {
                    let earned = 0,
                        msg = '';
                    if (wrongCount === 0) {
                        earned = 20;
                        msg = '🎉 一次性答对！+20分';
                    } else if (wrongCount === 1) {
                        earned = 10;
                        msg = '💪 错1次后答对！+10分';
                    } else {
                        earned = 5;
                        msg = '😅 错2次及以上答对！+5分';
                    }
                    score += earned;
                    roundScored = true;
                    if (isExamMode) examCorrectCount++;
                    updateScoreUI();
                    resultMsg.textContent = `✅ 完全正确！ ${msg}`;
                    resultMsg.className = 'result score-info';
                    isWaiting = true;
                    submitBtn.disabled = true;
                    answerInput.disabled = true;
                    setTimeout(() => {
                        submitBtn.disabled = false;
                        answerInput.disabled = false;
                        isWaiting = false;
                        nextQuestion();
                    }, 1200);
                } else {
                    wrongCount++;
                    resultMsg.textContent = `❌ 再数数看… 再试一次！`;
                    resultMsg.className = 'result try-again';
                    answerInput.value = '';
                    answerInput.focus();
                }
            }

            function goToNextRound() {
                if (isGameFinished) {
                    resultMsg.textContent = '游戏已结束，点击“重玩”重新开始。';
                    resultMsg.className = 'result info';
                    return;
                }
                if (isWaiting) {
                    resultMsg.textContent = '⏳ 请稍候，正在处理中…';
                    resultMsg.className = 'result info';
                    return;
                }
                if (roundScored) {
                    isWaiting = true;
                    submitBtn.disabled = true;
                    answerInput.disabled = true;
                    setTimeout(() => {
                        submitBtn.disabled = false;
                        answerInput.disabled = false;
                        isWaiting = false;
                        nextQuestion();
                    }, 300);
                    return;
                }

                resultMsg.textContent = `⏭️ 已跳过第 ${round} 轮，该轮得 0 分`;
                resultMsg.className = 'result skipped';
                roundScored = true;
                isWaiting = true;
                submitBtn.disabled = true;
                answerInput.disabled = true;
                setTimeout(() => {
                    submitBtn.disabled = false;
                    answerInput.disabled = false;
                    isWaiting = false;
                    nextQuestion();
                }, 800);
            }

            // ============================================================
            //  答题模式
            // ============================================================
            function openExamModal() {
                modeModal.classList.add('open');
                nameInput.value = '';
                nameInput.focus();
                startExamBtn.disabled = false;
                startExamBtn.textContent = '开始答题';
                // 清空反馈
                whitelistFeedback.className = 'whitelist-feedback';
                whitelistFeedback.textContent = '';
            }

            function closeExamModal() {
                modeModal.classList.remove('open');
                startExamBtn.disabled = false;
                startExamBtn.textContent = '开始答题';
                // 清空反馈
                whitelistFeedback.className = 'whitelist-feedback';
                whitelistFeedback.textContent = '';
            }

            async function startExam() {
                const name = nameInput.value.trim();
                if (!name) {
                    whitelistFeedback.className = 'whitelist-feedback error';
                    whitelistFeedback.textContent = '⚠️ 请填写您的姓名！';
                    nameInput.focus();
                    return;
                }
                const cls = classSelect.value;

                // 禁用按钮，显示校验中
                startExamBtn.disabled = true;
                startExamBtn.textContent = '⏳ 校验中...';
                whitelistFeedback.className = 'whitelist-feedback loading';
                whitelistFeedback.textContent = '⏳ 正在校验白名单...';

                try {
                    // 白名单校验
                    const isWhitelisted = await checkWhitelist(name, cls);
                    if (!isWhitelisted) {
                        whitelistFeedback.className = 'whitelist-feedback error';
                        whitelistFeedback.textContent = '❌ 您不在白名单中，请联系管理员添加。';
                        startExamBtn.disabled = false;
                        startExamBtn.textContent = '开始答题';
                        return;
                    }

                    // 通过校验，进入答题模式
                    whitelistFeedback.className = 'whitelist-feedback success';
                    whitelistFeedback.textContent = '✅ 校验通过，即将开始答题...';
                    examName = name;
                    examClass = cls;
                    isExamMode = true;
                    examCorrectCount = 0;
                    usedPatternIndices = [];
                    modeBadge.classList.add('active');
                    modeBtn.textContent = '📝 答题中...';
                    modeBtn.classList.add('exam-active');

                    // 延迟关闭弹窗，让用户看到成功反馈
                    setTimeout(() => {
                        closeExamModal();
                        resetGameForExam();
                        // 启动计时器
                        startTimer();
                    }, 600);
                } catch (err) {
                    console.warn('白名单校验异常:', err);
                    whitelistFeedback.className = 'whitelist-feedback error';
                    whitelistFeedback.textContent = '❌ 校验失败，请稍后重试。';
                    startExamBtn.disabled = false;
                    startExamBtn.textContent = '开始答题';
                }
            }

            function resetGameForExam() {
                isWaiting = false;
                isGameFinished = false;
                score = 0;
                round = 0;
                wrongCount = 0;
                shapeItems = [];
                askedShapes = [];
                examCorrectCount = 0;
                usedPatternIndices = [];
                roundScored = false;
                resetTimer();
                updateScoreUI();
                submitBtn.disabled = false;
                answerInput.disabled = false;
                nextBtn.disabled = false;
                numKeypad.querySelectorAll('.num-btn').forEach(b => b.disabled = false);
                nextQuestion();
            }

            function showScoreModal(timeStr) {
                resultName.textContent = examName || '-';
                resultClass.textContent = examClass || '-';
                resultCorrect.textContent = `${examCorrectCount} / ${TOTAL_ROUNDS}`;
                resultTime.textContent = timeStr || getTimerString();
                resultTotal.textContent = score;
                scoreModal.classList.add('open');
            }

            function closeScoreModal() {
                scoreModal.classList.remove('open');
            }

            function viewScore() {
                if (isGameFinished && isExamMode) {
                    showScoreModal(getTimerString());
                } else if (isExamMode) {
                    resultMsg.textContent = '⏳ 答题进行中，请完成所有题目！';
                    resultMsg.className = 'result info';
                } else {
                    resultMsg.textContent = '请先进入答题模式！';
                    resultMsg.className = 'result info';
                }
            }

            // ============================================================
            //  重置
            // ============================================================
            function resetGame() {
                isExamMode = false;
                modeBadge.classList.remove('active');
                modeBtn.textContent = '📝 答题模式';
                modeBtn.classList.remove('exam-active');
                closeScoreModal();
                stopTimer();
                resetTimer();
                isWaiting = false;
                isGameFinished = false;
                score = 0;
                round = 0;
                wrongCount = 0;
                shapeItems = [];
                askedShapes = [];
                usedPatternIndices = [];
                examCorrectCount = 0;
                roundScored = false;
                updateScoreUI();
                submitBtn.disabled = false;
                answerInput.disabled = false;
                nextBtn.disabled = false;
                numKeypad.querySelectorAll('.num-btn').forEach(b => b.disabled = false);
                nextQuestion();
                // 刷新排行榜
                refreshLeaderboard();
            }

            // ============================================================
            //  事件绑定
            // ============================================================
            submitBtn.addEventListener('click', checkAnswer);
            resetBtn.addEventListener('click', resetGame);
            nextBtn.addEventListener('click', goToNextRound);

            answerInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkAnswer();
                }
            });

            modeBtn.addEventListener('click', function() {
                if (isExamMode && isGameFinished) {
                    viewScore();
                } else if (isExamMode) {
                    resultMsg.textContent = '⏳ 答题进行中，请完成所有题目！';
                    resultMsg.className = 'result info';
                } else {
                    openExamModal();
                }
            });

            startExamBtn.addEventListener('click', startExam);
            cancelExamBtn.addEventListener('click', closeExamModal);
            closeScoreBtn.addEventListener('click', closeScoreModal);

            modeModal.addEventListener('click', function(e) {
                if (e.target === this) closeExamModal();
            });
            scoreModal.addEventListener('click', function(e) {
                if (e.target === this) closeScoreModal();
            });

            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    // 触发点击开始答题
                    startExamBtn.click();
                }
            });

            // 刷新排行榜
            refreshLeaderboardBtn.addEventListener('click', refreshLeaderboard);

            // 点击画布聚焦输入框
            gameArea.addEventListener('click', function() {
                if (!answerInput.disabled) answerInput.focus();
            });

            // 窗口自适应
            let resizeTimer = null;
            window.addEventListener('resize', () => {
                if (resizeTimer) cancelAnimationFrame(resizeTimer);
                resizeTimer = requestAnimationFrame(() => {
                    resizeScene();
                });
            });

            // ============================================================
            //  初始化
            // ============================================================
            function init() {
                patternData = BUILTIN_PATTERNS.slice();
                usedPatternIndices = [];
                resetGame();
                initNumKeypad();
                // 首次加载排行榜
                refreshLeaderboard();
                console.log(`✅ 平面图形数数小游戏已启动 (第5轮居中，无三角形，无API)`);
            }

            init();
        })();
    </script>

</body>
</html>
